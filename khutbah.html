<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khutbah — Khutbah Cave</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .breadcrumb {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 5vw;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .breadcrumb a { color: var(--green); }
    .breadcrumb span { margin: 0 0.4rem; }

    .khutbah-header {
      background: var(--green);
      color: #fff;
      padding: 4rem 5vw 3.5rem;
    }
    .kh-inner { max-width: 780px; margin: 0 auto; }
    .kh-tag {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold-light);
      margin-bottom: 1rem;
    }
    .kh-title {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 300;
      color: #fff;
      line-height: 1.15;
    }
    .kh-meta {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-top: 1.5rem;
      color: rgba(255,255,255,0.6);
      font-size: 0.875rem;
      flex-wrap: wrap;
    }
    .kh-author {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--gold-light);
    }
    .kh-author::before {
      content: '';
      width: 20px; height: 1px;
      background: var(--gold);
      display: inline-block;
    }

    .khutbah-body {
      max-width: 780px;
      margin: 3.5rem auto;
      padding: 0 5vw;
    }
    .khutbah-body .part-label {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .khutbah-body .part-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .khutbah-body p {
      color: var(--text);
      font-size: 1.05rem;
      line-height: 1.85;
      margin-bottom: 1.4rem;
      white-space: pre-wrap;
    }
    .part-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 3rem 0;
    }

    .khutbah-nav {
      max-width: 780px;
      margin: 2rem auto 0;
      padding: 2rem 5vw;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .khutbah-nav a {
      color: var(--green);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .khutbah-nav a:hover { color: var(--gold); }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <polygon points="11,1 13.9,7.6 21,8.5 16,13.4 17.6,21 11,17.3 4.4,21 6,13.4 1,8.5 8.1,7.6" fill="none" stroke="#E8C47A" stroke-width="1.5" stroke-linejoin="round"/>
    </svg>
    Khutbah Cave
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="khutbahs.html" class="active">Khutbahs</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="download.html" class="nav-cta">Get the App</a></li>
  </ul>
</nav>

<div class="breadcrumb">
  <a href="khutbahs.html">Khutbahs</a>
  <span>›</span>
  <span id="breadcrumb-title">Loading…</span>
</div>

<div id="page-content">
  <div class="loading" style="padding: 6rem 0;">Loading khutbah…</div>
</div>

<div class="khutbah-nav">
  <a href="khutbahs.html">← Back to library</a>
  <a id="full-khutbah-btn" href="#" class="btn btn-gold" style="font-size:0.875rem; padding:0.55rem 1.25rem;">
    🕌 View Full Khutbah (Arabic + English)
  </a>
  <a href="download.html">Read more in the app →</a>
</div>

<footer>
  <div class="footer-logo">Khutbah Cave</div>
  <p>A library of Friday sermons for the modern Muslim.</p>
  <p style="margin-top:1rem"><a href="about.html">About</a> · <a href="khutbahs.html">Khutbahs</a> · <a href="download.html">Download</a></p>
</footer>

<script type="module">
  import { getKhutbahBySlug } from './js/api.js'

  const params = new URLSearchParams(window.location.search)
  const slug   = params.get('slug')

  async function load() {
    if (!slug) { showError('No khutbah specified.'); return }
    try {
      const khutbah = await getKhutbahBySlug(slug)
      if (!khutbah) { showError('Khutbah not found.'); return }
      render(khutbah)
    } catch (err) {
      showError('Failed to load khutbah. Please try again.')
      console.error(err)
    }
  }

  function render(k) {
    document.title = `${k.title} — Khutbah Cave`
    document.getElementById('breadcrumb-title').textContent = k.title
    document.getElementById('full-khutbah-btn').href = `khutbah-full.html?slug=${k.slug}`

    const date = k.publish_date
      ? new Date(k.publish_date).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' })
      : null

    document.getElementById('page-content').innerHTML = `
      <div class="khutbah-header">
        <div class="kh-inner">
          <div class="kh-tag">Friday Khutbah</div>
          <h1 class="kh-title">${k.title}</h1>
          <div class="kh-meta">
            <span class="kh-author">${k.author || 'Unknown'}</span>
            ${date ? `<span>${date}</span>` : ''}
          </div>
        </div>
      </div>
      <div class="khutbah-body">
        ${k.english_part1 ? `
          <div class="part-label">Part one</div>
          <p>${escHtml(k.english_part1)}</p>
        ` : ''}
        ${k.english_part1 && k.english_part2 ? '<hr class="part-divider" />' : ''}
        ${k.english_part2 ? `
          <div class="part-label">Part two</div>
          <p>${escHtml(k.english_part2)}</p>
        ` : ''}
      </div>
    `
  }

  function showError(msg) {
    document.getElementById('page-content').innerHTML = `<div class="empty">${msg}</div>`
  }

  function escHtml(str) {
    return String(str ?? '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
  }

  load()
</script>
</body>
</html>
