[build]
functions = "netlify/functions"

[[headers]]
  for = "/"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/js/"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/api/khutbahs"
  to = "/.netlify/functions/khutbahs"
  status = 200

[[redirects]]
  from = "/"
  to = "/index.html"
  status = 404